name: offline_music_player
description: A premium offline music player app built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  on_audio_query: ^2.9.0
  just_audio: ^0.9.37
  audio_service: ^0.18.15
  audio_session: ^0.1.21
  file_picker: 6.1.1
  image_picker: 1.0.8
  path_provider: ^2.1.3
  google_fonts: ^4.0.4
  marquee: ^2.2.3
  rxdart: ^0.27.7
  intl: ^0.19.0
  palette_generator: ^0.3.3
  flutter_staggered_animations: ^1.0.0
  audiotags: ^1.4.2
  ringtone_set: ^0.0.3
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
